name: Build RPi5 Installer (custom kernel)

# WHY custom kernel: official Talos kernel (6.18.x) + sbc-raspberrypi DTBs
# (from RPi 6.12.25) cause a kernel/DTB version mismatch — RP1 southbridge
# won't init, giving no Ethernet and no USB. We build with the RPi kernel
# (stable_20250428 / 6.12.25) so kernel and DTBs are always from the same source.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version tag (e.g. v1.13.0)'
        required: true
        default: 'v1.13.0'

env:
  REGISTRY: ghcr.io
  USERNAME: ${{ github.repository_owner }}
  RPI_KERNEL_VERSION: stable_20250428
  RPI_KERNEL_SHA256: c95906cfbc7808de5860c6d86537bea22e3501f600a5209de59a86cb436886f6
  RPI_KERNEL_SHA512: 0ed5d490c491e590b5980dccf6fcac0dd3c47accbfacd40d91507c12801cff34fa6a1c68991c8a6c57bb259c909121414766f35a0b11c4bd5d62c3e11d710839

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set versions
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TALOS="${{ inputs.talos_version }}"
          else
            TALOS="${{ github.ref_name }}"
          fi
          echo "talos=${TALOS}" >> "$GITHUB_OUTPUT"
          # PKG_VERSION: strip patch, add .0 (v1.13.0 → v1.13.0)
          PKG="${TALOS%.*}.0"
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5

      - name: Configure git bot identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      # ── Get RPi5 kernel config + module list from talos-rpi5 v1.11.x patches ─
      - name: Clone talos-rpi5 patches
        run: git clone --depth 1 https://github.com/talos-rpi5/talos-builder.git talos-rpi5-builder

      - name: Extract RPi5 kernel config (apply patch to pkgs v1.11.0)
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/siderolabs/pkgs.git pkgs-v1110
          # Use absolute path — git -C changes git's cwd so relative paths resolve inside the repo
          git -C pkgs-v1110 am "$GITHUB_WORKSPACE/talos-rpi5-builder/patches/siderolabs/pkgs/0001-Patched-for-Raspberry-Pi-5.patch"
          cp pkgs-v1110/kernel/build/config-arm64 rpi5-config-arm64

      - name: Extract RPi5 module list (apply patch to talos v1.11.5)
        run: |
          git clone --depth 1 --branch v1.11.5 https://github.com/siderolabs/talos.git talos-v1115
          git -C talos-v1115 am "$GITHUB_WORKSPACE/talos-rpi5-builder/patches/siderolabs/talos/0001-Patched-for-Raspberry-Pi-5.patch"
          cp talos-v1115/hack/modules-arm64.txt rpi5-modules-arm64.txt

      # ── Patch siderolabs/pkgs at target version ───────────────────────────────
      - name: Clone pkgs ${{ steps.ver.outputs.pkg }}
        run: git clone --depth 1 --branch ${{ steps.ver.outputs.pkg }} https://github.com/siderolabs/pkgs.git pkgs

      - name: Patch pkgs — switch to RPi kernel
        env:
          TALOS_VERSION: ${{ steps.ver.outputs.talos }}
          PKG_VERSION: ${{ steps.ver.outputs.pkg }}
        run: |
          # Detect current upstream linux_version to build the replacement block
          export UPSTREAM_VER=$(grep 'linux_version:' pkgs/Pkgfile | head -1 | awk '{print $2}')
          export UPSTREAM_SHA256=$(grep 'linux_sha256:' pkgs/Pkgfile | head -1 | awk '{print $2}')
          export UPSTREAM_SHA512=$(grep 'linux_sha512:' pkgs/Pkgfile | head -1 | awk '{print $2}')

          python3 - << PYEOF
          import re, os

          path = 'pkgs/Pkgfile'
          text = open(path).read()

          old_block = (
              f'  linux_version: {os.environ["UPSTREAM_VER"]}\n'
              f'  linux_sha256: {os.environ["UPSTREAM_SHA256"]}\n'
              f'  linux_sha512: {os.environ["UPSTREAM_SHA512"]}'
          )
          new_block = (
              f'  linux_version: {os.environ["RPI_KERNEL_VERSION"]}\n'
              f'  linux_sha256: {os.environ["RPI_KERNEL_SHA256"]}\n'
              f'  linux_sha512: {os.environ["RPI_KERNEL_SHA512"]}'
          )
          # Also swap the renovate datasource comment on the preceding line
          text = text.replace(
              'depName=git://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git',
              'depName=https://github.com/raspberrypi/linux.git'
          )
          text = text.replace(old_block, new_block)
          open(path, 'w').write(text)
          PYEOF

          # Fix kernel download URL to GitHub RPi archive (.tar.gz not .tar.xz)
          python3 - << 'PYEOF'
          path = 'pkgs/kernel/prepare/pkg.yaml'
          text = open(path).read()
          import re
          text = re.sub(
              r'url: https://cdn\.kernel\.org[^\n]+',
              'url: "https://github.com/raspberrypi/linux/archive/refs/tags/{{ .linux_version }}.tar.gz"',
              text
          )
          text = text.replace('destination: linux.tar.xz', 'destination: linux.tar.gz')
          text = text.replace('tar -xJf linux.tar.xz', 'tar -xzf linux.tar.gz')
          open(path, 'w').write(text)
          PYEOF

          # Install the RPi5-compatible kernel config (Linux 6.12.25 RPi)
          cp rpi5-config-arm64 pkgs/kernel/build/config-arm64

          # Skip hardening checks that don't apply to the RPi vendor kernel:
          #   CONFIG_ARM64_GCS requires Armv9.4-A; RPi5 Cortex-A76 is Armv8.2-A
          python3 - << 'PYEOF'
          path = 'pkgs/kernel/build/scripts/filter-hardened-check.py'
          text = open(path).read()
          additions = (
              "        'CONFIG_ARM64_GCS', # requires Armv9.4-A; RPi5 Cortex-A76 is Armv8.2-A\n"
              "        'CONFIG_ARM64_BTI_KERNEL', # not in RPi vendor kernel config\n"
              "        'CONFIG_ZERO_CALL_USED_REGS', # not in RPi vendor kernel config\n"
              "        'CONFIG_HARDENED_USERCOPY_DEFAULT_ON', # not in RPi vendor kernel config\n"
          )
          marker = "    'arm64': {\n"
          text = text.replace(marker, marker + additions, 1)
          open(path, 'w').write(text)
          PYEOF

          git -C pkgs commit -am "rpi5: use raspberrypi/linux ${{ env.RPI_KERNEL_VERSION }}"

      # ── Build RPi5 kernel ────────────────────────────────────────────────────
      - name: Build RPi5 kernel
        run: |
          make -C pkgs \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.USERNAME }} \
            PUSH=true \
            PLATFORM=linux/arm64 \
            kernel
          echo "PKGS_TAG=$(git -C pkgs describe --tags --always --dirty --match 'v[0-9]*')" >> "$GITHUB_ENV"

      # ── Patch siderolabs/talos at target version ──────────────────────────────
      - name: Clone talos ${{ steps.ver.outputs.talos }}
        run: git clone --depth 1 --branch ${{ steps.ver.outputs.talos }} https://github.com/siderolabs/talos.git talos

      - name: Patch talos — RPi5 module list
        run: |
          cp rpi5-modules-arm64.txt talos/hack/modules-arm64.txt
          git -C talos commit -am "rpi5: update modules-arm64.txt for RPi kernel ${{ env.RPI_KERNEL_VERSION }}"
          echo "TALOS_TAG=$(git -C talos describe --tags --always --dirty --match 'v[0-9]*')" >> "$GITHUB_ENV"

      # ── Build installer ───────────────────────────────────────────────────────
      - name: Build Talos installer
        run: |
          make -C talos \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.USERNAME }} \
            PUSH=true \
            PKG_KERNEL="${{ env.REGISTRY }}/${{ env.USERNAME }}/kernel:${{ env.PKGS_TAG }}" \
            INSTALLER_ARCH=arm64 PLATFORM=linux/arm64 \
            IMAGER_ARGS="--overlay-name=rpi_5 --overlay-image=ghcr.io/siderolabs/sbc-raspberrypi:v0.2.0" \
            kernel initramfs imager installer-base installer

      # Re-tag with the clean version for easy reference
      - name: Tag installer as ${{ steps.ver.outputs.talos }}
        run: |
          BUILT_TAG="${{ env.REGISTRY }}/${{ env.USERNAME }}/installer:${{ env.TALOS_TAG }}"
          CLEAN_TAG="${{ env.REGISTRY }}/${{ env.USERNAME }}/installer:${{ steps.ver.outputs.talos }}"
          docker pull "${BUILT_TAG}"
          docker tag "${BUILT_TAG}" "${CLEAN_TAG}"
          docker push "${CLEAN_TAG}"

      # ── Build metal disk image ─────────────────────────────────────────────────
      - name: Build metal disk image
        run: |
          mkdir -p _out
          docker run --rm -t \
            -v "${PWD}/_out:/out" \
            -v /dev:/dev --privileged \
            "${{ env.REGISTRY }}/${{ env.USERNAME }}/imager:${{ env.TALOS_TAG }}" \
            metal --arch arm64 \
            --base-installer-image="${{ env.REGISTRY }}/${{ env.USERNAME }}/installer:${{ steps.ver.outputs.talos }}" \
            --overlay-name=rpi_5 \
            --overlay-image=ghcr.io/siderolabs/sbc-raspberrypi:v0.2.0

      - name: Inject RPi5 firmware into metal image boot partition
        run: |
          cd _out

          # Decompress if imager already compressed it
          if [ -f metal-arm64.raw.zst ] && [ ! -f metal-arm64.raw ]; then
            zstd -d metal-arm64.raw.zst && rm metal-arm64.raw.zst
          fi

          # Get U-Boot for RPi ARM64 (covers RPi5) from Ubuntu package
          curl -sLO "http://ports.ubuntu.com/pool/main/u/u-boot/u-boot-rpi_2025.10-0ubuntu2_arm64.deb"
          ar x u-boot-rpi_2025.10-0ubuntu2_arm64.deb
          mkdir -p /tmp/uboot && zstd -d data.tar.zst -c | tar x -C /tmp/uboot

          # Extract RPi5 DTBs from the overlay image
          docker create --name rpi-overlay --entrypoint /bin/sh ghcr.io/siderolabs/sbc-raspberrypi:v0.2.0
          mkdir -p /tmp/rpi-overlay
          docker export rpi-overlay | tar x -C /tmp/rpi-overlay
          docker rm rpi-overlay

          # Mount EFI partition (partition 1) via loop device
          LOOP=$(sudo losetup -f --show -P metal-arm64.raw)
          sudo mkdir -p /mnt/efi
          sudo mount "${LOOP}p1" /mnt/efi

          # U-Boot: RPi5 EEPROM loads this as 'kernel', then U-Boot provides UEFI
          sudo cp /tmp/uboot/usr/lib/u-boot/rpi_arm64/u-boot.bin /mnt/efi/

          # RPi5 DTBs (from sbc-raspberrypi overlay)
          sudo cp /tmp/rpi-overlay/artifacts/rpi_5/bcm2712*.dtb /mnt/efi/
          sudo cp -r /tmp/rpi-overlay/artifacts/rpi_5/overlays /mnt/efi/

          # config.txt: RPi5 EEPROM loads U-Boot, U-Boot provides UEFI for EFI/BOOT/BOOTAA64.efi
          printf 'arm_64bit=1\nenable_uart=1\nuart_2ndstage=1\nkernel=u-boot.bin\n[pi5]\narm_boost=1\ndtoverlay=bcm2712d0\n' \
            | sudo tee /mnt/efi/config.txt

          echo "==> Boot partition contents after injection:"
          ls /mnt/efi/

          sudo umount /mnt/efi
          sudo losetup -d "${LOOP}"

      - name: Compress disk image
        run: |
          [ -f _out/metal-arm64.raw.zst ] || zstd --rm _out/metal-arm64.raw -o _out/metal-arm64.raw.zst

      # ── Release ───────────────────────────────────────────────────────────────
      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          > ⚠️ Experimental build, use at your own risk.

          Talos Linux for Raspberry Pi 5 — custom RPi kernel build.

          Uses raspberrypi/linux (6.12.25) instead of the Talos mainline kernel
          to keep kernel and device-tree binaries in sync, which is required for
          RP1 southbridge initialisation (Ethernet + USB on RPi5).

          ### Fresh install
          ```
          zstd -dc metal-arm64.raw.zst | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
          sudo sgdisk --move-second-header /dev/sdX
          ```
          The `sgdisk` step fixes the GPT backup header (image is 2.2 GB, card is larger).
          Talos expands the EPHEMERAL partition automatically on first boot.

          ### Upgrade existing node
          ```
          talosctl upgrade --nodes <NODE_IP> --image ghcr.io/roiterorh/installer:v1.13.0
          ```
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.talos }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            2>/dev/null || true
          gh release upload "$TAG" \
            _out/metal-arm64.raw.zst \
            --clobber
